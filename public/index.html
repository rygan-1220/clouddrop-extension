<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudDrop Mobile</title>
    <script src="/socket.io/socket.io.js"></script>
    <meta name="theme-color" content="#ffffff">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --primary-light: #dbeafe;
            --bg: #ffffff;
            --surface: #f8fafc;
            --text: #0f172a;
            --muted: #64748b;
            --border: #e2e8f0
        }

        * {
            box-sizing: border-box
        }

        html,
        body {
            height: 100%;
            overflow: hidden
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            padding: 16px;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            gap: 12px
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 0;
            padding-bottom: 12px;
            flex: 0 0 auto;
            border-bottom: 1px solid var(--border)
        }

        h2 {
            margin: 0;
            font-size: 22px;
            font-weight: 700
        }

        #status {
            font-size: 12px;
            color: var(--muted);
            font-weight: 500;
            padding: 6px 12px;
            background: var(--primary-light);
            border-radius: 0;
            border-left: 3px solid var(--primary);
            min-width: 0;
            max-width: 62%;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis
        }

        #chat {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            margin-bottom: 0;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: var(--surface);
            border-radius: 0;
            border: 1px solid var(--border)
        }

        .msg-row {
            display: flex;
            margin-bottom: 2px
        }

        .msg-row.me {
            justify-content: flex-end
        }

        .msg-row.them {
            justify-content: flex-start
        }

        .message {
            width: 80%;
            padding: 11px 14px;
            border-radius: 0;
            word-break: break-word;
            display: flex;
            flex-direction: column;
            gap: 6px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06)
        }

        .message.me {
            background: var(--primary);
            color: white
        }

        .message.them {
            background: white;
            color: var(--text);
            border: 1px solid var(--border)
        }

        .meta {
            font-size: 11px;
            color: var(--muted)
        }

        .message.me .meta {
            color: rgba(255, 255, 255, 0.8)
        }

        .copy-btn {
            background: transparent;
            border: none;
            color: inherit;
            cursor: pointer;
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 0;
            opacity: 0.7;
            transition: all 0.2s;
            margin-left: 8px;
            width: auto;
            min-width: 0;
            align-self: flex-start;
        }

        .copy-btn:hover {
            opacity: 1;
            background: rgba(0, 0, 0, 0.05)
        }

        .message.me .copy-btn:hover {
            background: rgba(255, 255, 255, 0.2)
        }

        .file-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            word-break: break-all
        }

        .file-link:hover {
            text-decoration: underline
        }

        form.controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: stretch;
            flex: 0 0 auto
        }

        input[type=text] {
            width: 100%;
            min-width: 0;
            padding: 10px 12px;
            border-radius: 0;
            border: 1px solid var(--border);
            font-size: 14px;
            font-family: inherit;
            background: white
        }

        input[type=text]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light)
        }

        form.controls button,
        input[type=file] {
            width: 100%;
            min-width: 0;
            padding: 10px 12px;
            border-radius: 0;
            border: none;
            cursor: pointer;
            font-weight: 500;
            font-family: inherit;
            transition: all 0.2s
        }

        input[type=file] {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text)
        }

        button.primary {
            background: var(--primary);
            color: white;
        }

        button.primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3)
        }
    </style>
</head>

<body>
    <header>
        <h2>CloudDrop</h2>
        <div id="status">Connecting...</div>
    </header>

    <div id="chat" aria-live="polite"></div>

    <form class="controls" id="controls" onsubmit="return false">
        <input type="text" id="textInput" placeholder="Type message...">
        <input type="file" id="fileInput" aria-label="Send file">
        <button id="sendBtn" class="primary">Send</button>
    </form>

    <script>
        const socket = io();

        // Extract room ID from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        let roomId = urlParams.get('room');

        const statusEl = document.getElementById('status');
        const chatEl = document.getElementById('chat');

        if (!roomId) {
            statusEl.textContent = 'No room. Scan the QR code from the extension.';
            document.getElementById('controls').querySelectorAll('input,button').forEach(el => el.disabled = true);
        } else {
            socket.emit('join-room', roomId);
            statusEl.textContent = `Room: ${roomId}`;
        }

        // Helper to add messages
        function addMessage(side, content, opts = {}) {
            const row = document.createElement('div');
            row.className = 'msg-row';

            const wrapper = document.createElement('div');
            wrapper.className = 'message ' + (side === 'me' ? 'me' : 'them');

            if (opts.meta) {
                const m = document.createElement('div');
                m.className = 'meta';
                m.textContent = opts.meta;
                wrapper.appendChild(m);
            }

            if (opts.file) {
                // If it's an image, preview
                if (opts.type && opts.type.startsWith('image/')) {
                    const img = document.createElement('img');
                    img.src = opts.file;
                    img.style.maxWidth = '200px';
                    img.style.borderRadius = '0';
                    wrapper.appendChild(img);
                } else {
                    const a = document.createElement('a');
                    a.href = opts.file;
                    a.download = opts.name || 'file';
                    a.className = 'file-link';
                    a.textContent = opts.name || 'Download file';
                    wrapper.appendChild(a);
                }
            } else {
                const t = document.createElement('div');
                t.textContent = content;
                wrapper.appendChild(t);

                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-btn';
                copyBtn.innerText = 'Copy';
                copyBtn.addEventListener('click', async () => {
                    try { await navigator.clipboard.writeText(content); copyBtn.innerText = 'Copied'; setTimeout(() => copyBtn.innerText = 'Copy', 900); } catch (e) { console.error(e) }
                });
                wrapper.appendChild(copyBtn);
            }

            row.appendChild(wrapper);
            chatEl.appendChild(row);
            chatEl.scrollTop = chatEl.scrollHeight;
        }

        // Server events
        socket.on('receive-text', (text) => addMessage('them', text, { meta: 'PC' }));
        socket.on('receive-file', (data) => addMessage('them', '', { file: data.file, name: data.name, type: data.type, meta: 'PC' }));
        socket.on('session-destroyed', (id) => {
            if (id === roomId) {
                statusEl.textContent = 'Session ended by host';
                document.getElementById('controls').querySelectorAll('input,button').forEach(el => el.disabled = true);
            }
        });

        // Send text
        document.getElementById('sendBtn').addEventListener('click', () => {
            const text = document.getElementById('textInput').value.trim();
            if (!text) return;
            socket.emit('send-text', { room: roomId, text: text });
            addMessage('me', text, { meta: 'Me' });
            document.getElementById('textInput').value = '';
        });

        // Send file
        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (event) {
                socket.emit('send-file', { room: roomId, name: file.name, type: file.type, file: event.target.result });
                addMessage('me', '', { file: event.target.result, name: file.name, type: file.type, meta: 'Me' });
            };
            reader.readAsDataURL(file);
            // reset input for next selection
            e.target.value = '';
        });

        // Make Enter key send message
        document.getElementById('textInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); document.getElementById('sendBtn').click(); } });
    </script>
</body>

</html>
