<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudDrop Mobile</title>
    <script src="/socket.io/socket.io.js"></script>
    <meta name="theme-color" content="#ffffff">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --primary-light: #dbeafe;
            --bg: #ffffff;
            --surface: #f8fafc;
            --text: #0f172a;
            --muted: #64748b;
            --border: #e2e8f0
        }

        * {
            box-sizing: border-box
        }

        html,
        body {
            height: 100%;
            overflow: hidden
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            padding: 16px;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            gap: 12px
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 0;
            padding-bottom: 12px;
            flex: 0 0 auto;
            border-bottom: 1px solid var(--border)
        }

        h2 {
            margin: 0;
            font-size: 22px;
            font-weight: 700
        }

        #status {
            font-size: 12px;
            color: var(--muted);
            font-weight: 500;
            padding: 6px 12px;
            background: var(--primary-light);
            border-radius: 0;
            border-left: 3px solid var(--primary);
            min-width: 0;
            max-width: 62%;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis
        }

        #chat {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            margin-bottom: 0;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: var(--surface);
            border-radius: 0;
            border: 1px solid var(--border)
        }

        .msg-row {
            display: flex;
            margin-bottom: 2px
        }

        .msg-row.me {
            justify-content: flex-end
        }

        .msg-row.them {
            justify-content: flex-start
        }

        .message {
            width: 80%;
            padding: 11px 14px;
            border-radius: 0;
            word-break: break-word;
            display: flex;
            flex-direction: column;
            gap: 6px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06)
        }

        .message.me {
            background: var(--primary);
            color: white
        }

        .message.them {
            background: white;
            color: var(--text);
            border: 1px solid var(--border)
        }

        .meta {
            font-size: 11px;
            color: var(--muted)
        }

        .message.me .meta {
            color: rgba(255, 255, 255, 0.8)
        }

        .copy-btn {
            background: transparent;
            border: none;
            color: inherit;
            cursor: pointer;
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 0;
            opacity: 0.7;
            transition: all 0.2s;
            margin-left: 8px;
            width: auto;
            min-width: 0;
            align-self: flex-start;
        }

        .copy-btn:hover {
            opacity: 1;
            background: rgba(0, 0, 0, 0.05)
        }

        .message.me .copy-btn:hover {
            background: rgba(255, 255, 255, 0.2)
        }

        .file-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            word-break: break-all
        }

        .file-link:hover {
            text-decoration: underline
        }

        form.controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: stretch;
            flex: 0 0 auto
        }

        input[type=text] {
            width: 100%;
            min-width: 0;
            padding: 10px 12px;
            border-radius: 0;
            border: 1px solid var(--border);
            font-size: 14px;
            font-family: inherit;
            background: white
        }

        input[type=text]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light)
        }

        form.controls button,
        input[type=file] {
            width: 100%;
            min-width: 0;
            padding: 10px 12px;
            border-radius: 0;
            border: none;
            cursor: pointer;
            font-weight: 500;
            font-family: inherit;
            transition: all 0.2s
        }

        input[type=file] {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text)
        }

        button.primary {
            background: var(--primary);
            color: white;
        }

        button.primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3)
        }
    </style>
</head>

<body>
    <header>
        <h2>CloudDrop</h2>
        <div id="status">Connecting...</div>
    </header>

    <div id="chat" aria-live="polite"></div>

    <form class="controls" id="controls" onsubmit="return false">
        <input type="text" id="textInput" placeholder="Type message...">
        <input type="file" id="fileInput" aria-label="Send file">
        <button id="sendBtn" class="primary">Send</button>
    </form>

    <script>
        const socket = io();
        const CHUNK_SIZE = 16 * 1024;
        const ACK_TIMEOUT_MS = 15000;
        const MAX_CHUNK_RETRY = 3;
        const outgoingTransfers = new Map();
        const incomingTransfers = new Map();

        function logTransfer(...args) {
            console.log('[CloudDrop Transfer]', ...args);
        }

        function normalizeChunkToUint8Array(chunk) {
            if (!chunk) return null;

            if (chunk instanceof ArrayBuffer) {
                return new Uint8Array(chunk);
            }

            if (ArrayBuffer.isView(chunk)) {
                return new Uint8Array(chunk.buffer, chunk.byteOffset, chunk.byteLength);
            }

            // Node-style Buffer JSON shape: { type: 'Buffer', data: number[] }
            if (chunk.type === 'Buffer' && Array.isArray(chunk.data)) {
                return new Uint8Array(chunk.data);
            }

            return null;
        }

        function uint8ArrayToBase64(bytes) {
            let binary = '';
            const chunkSize = 0x1000;

            for (let i = 0; i < bytes.length; i += chunkSize) {
                const slice = bytes.subarray(i, i + chunkSize);
                let chunk = '';
                for (let j = 0; j < slice.length; j += 1) {
                    chunk += String.fromCharCode(slice[j]);
                }
                binary += chunk;
            }

            return btoa(binary);
        }

        function base64ToUint8Array(base64) {
            const binary = atob(base64);
            const bytes = new Uint8Array(binary.length);

            for (let i = 0; i < binary.length; i += 1) {
                bytes[i] = binary.charCodeAt(i);
            }

            return bytes;
        }

        // Extract room ID from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        let roomId = urlParams.get('room');

        const statusEl = document.getElementById('status');
        const chatEl = document.getElementById('chat');

        function createTransferId() {
            return `t_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
        }

        function sendChunk(transferId) {
            const transfer = outgoingTransfers.get(transferId);
            if (!transfer) return;

            const index = transfer.nextIndex;
            if (index >= transfer.totalChunks) return;

            const start = index * CHUNK_SIZE;
            const end = Math.min(start + CHUNK_SIZE, transfer.bytes.length);
            const slice = transfer.bytes.slice(start, end);
            const chunkBase64 = uint8ArrayToBase64(slice);
            logTransfer('send-chunk', { transferId, index, totalChunks: transfer.totalChunks, bytes: slice.length });

            socket.emit('file-chunk', {
                room: roomId,
                transferId,
                index,
                chunkBase64
            });

            clearTimeout(transfer.timer);
            transfer.timer = setTimeout(() => {
                transfer.retries[index] = (transfer.retries[index] || 0) + 1;
                if (transfer.retries[index] > MAX_CHUNK_RETRY) {
                    outgoingTransfers.delete(transferId);
                    logTransfer('chunk-failed', { transferId, index, name: transfer.name });
                    addMessage('me', `File failed: ${transfer.name}`, { meta: 'System' });
                    socket.emit('file-error', {
                        room: roomId,
                        transferId,
                        reason: 'ack_timeout'
                    });
                    return;
                }
                sendChunk(transferId);
            }, ACK_TIMEOUT_MS);
        }

        function startChunkTransfer(file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const bytes = new Uint8Array(event.target.result);
                const transferId = createTransferId();
                const totalChunks = Math.ceil(bytes.length / CHUNK_SIZE);

                logTransfer('file-init', { transferId, name: file.name, size: file.size, totalChunks });

                outgoingTransfers.set(transferId, {
                    name: file.name,
                    type: file.type,
                    size: file.size,
                    bytes,
                    totalChunks,
                    nextIndex: 0,
                    retries: {},
                    timer: null
                });

                socket.emit('file-init', {
                    room: roomId,
                    transferId,
                    name: file.name,
                    type: file.type,
                    size: file.size,
                    chunkSize: CHUNK_SIZE,
                    totalChunks
                });

                sendChunk(transferId);
                addMessage('me', `Sending ${file.name}...`, { meta: 'Me' });
            };
            reader.readAsArrayBuffer(file);
        }

        if (!roomId) {
            statusEl.textContent = 'No room. Scan the QR code from the extension.';
            document.getElementById('controls').querySelectorAll('input,button').forEach(el => el.disabled = true);
        } else {
            socket.emit('join-room', roomId);
            statusEl.textContent = `Room: ${roomId}`;
        }

        // Helper to add messages
        function addMessage(side, content, opts = {}) {
            const row = document.createElement('div');
            row.className = 'msg-row';

            const wrapper = document.createElement('div');
            wrapper.className = 'message ' + (side === 'me' ? 'me' : 'them');

            if (opts.meta) {
                const m = document.createElement('div');
                m.className = 'meta';
                m.textContent = opts.meta;
                wrapper.appendChild(m);
            }

            if (opts.file) {
                // If it's an image, preview
                if (opts.type && opts.type.startsWith('image/')) {
                    const img = document.createElement('img');
                    img.src = opts.file;
                    img.style.maxWidth = '200px';
                    img.style.borderRadius = '0';
                    wrapper.appendChild(img);
                } else {
                    const a = document.createElement('a');
                    a.href = opts.file;
                    a.download = opts.name || 'file';
                    a.className = 'file-link';
                    a.textContent = opts.name || 'Download file';
                    wrapper.appendChild(a);
                }
            } else {
                const t = document.createElement('div');
                t.textContent = content;
                wrapper.appendChild(t);

                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-btn';
                copyBtn.innerText = 'Copy';
                copyBtn.addEventListener('click', async () => {
                    try { await navigator.clipboard.writeText(content); copyBtn.innerText = 'Copied'; setTimeout(() => copyBtn.innerText = 'Copy', 900); } catch (e) { console.error(e) }
                });
                wrapper.appendChild(copyBtn);
            }

            row.appendChild(wrapper);
            chatEl.appendChild(row);
            chatEl.scrollTop = chatEl.scrollHeight;
        }

        // Server events
        socket.on('receive-text', (text) => addMessage('them', text, { meta: 'PC' }));
        socket.on('receive-file', (data) => addMessage('them', '', { file: data.file, name: data.name, type: data.type, meta: 'PC' }));

        socket.on('file-init', (data) => {
            incomingTransfers.set(data.transferId, {
                name: data.name,
                type: data.type,
                totalChunks: data.totalChunks,
                chunks: new Array(data.totalChunks),
                received: 0
            });
        });

        socket.on('file-chunk', (data) => {
            const transfer = incomingTransfers.get(data.transferId);
            if (!transfer) return;

            const normalizedChunk = normalizeChunkToUint8Array(data.chunk)
                || (typeof data.chunkBase64 === 'string' ? base64ToUint8Array(data.chunkBase64) : null);
            if (!normalizedChunk) {
                logTransfer('invalid-chunk-format', { transferId: data.transferId, index: data.index });
                socket.emit('file-error', {
                    room: roomId,
                    transferId: data.transferId,
                    reason: 'invalid_chunk_format'
                });
                return;
            }

            if (!transfer.chunks[data.index]) {
                transfer.chunks[data.index] = normalizedChunk;
                transfer.received += 1;
                logTransfer('recv-chunk', { transferId: data.transferId, index: data.index, received: transfer.received, totalChunks: transfer.totalChunks, bytes: normalizedChunk.length });
            }

            socket.emit('file-ack', {
                room: roomId,
                transferId: data.transferId,
                index: data.index
            });

            if (transfer.received === transfer.totalChunks) {
                const blob = new Blob(transfer.chunks, {
                    type: transfer.type || 'application/octet-stream'
                });
                const objectUrl = URL.createObjectURL(blob);
                logTransfer('file-complete-local', { transferId: data.transferId, name: transfer.name, size: blob.size });
                addMessage('them', '', { file: objectUrl, name: transfer.name, type: transfer.type, meta: 'PC' });
                socket.emit('file-complete', {
                    room: roomId,
                    transferId: data.transferId
                });
                incomingTransfers.delete(data.transferId);
            }
        });

        socket.on('file-ack', (data) => {
            const transfer = outgoingTransfers.get(data.transferId);
            if (!transfer) return;
            if (data.index !== transfer.nextIndex) return;

            clearTimeout(transfer.timer);
            transfer.nextIndex += 1;
            logTransfer('ack', { transferId: data.transferId, index: data.index, nextIndex: transfer.nextIndex });

            if (transfer.nextIndex < transfer.totalChunks) {
                sendChunk(data.transferId);
            }
        });

        socket.on('file-complete', (data) => {
            const transfer = outgoingTransfers.get(data.transferId);
            if (!transfer) return;

            clearTimeout(transfer.timer);
            outgoingTransfers.delete(data.transferId);
            logTransfer('file-complete-remote', { transferId: data.transferId, name: transfer.name });
            addMessage('me', `Sent ${transfer.name}`, { meta: 'System' });
        });

        socket.on('file-error', (data) => {
            if (data.transferId && outgoingTransfers.has(data.transferId)) {
                const transfer = outgoingTransfers.get(data.transferId);
                clearTimeout(transfer.timer);
                outgoingTransfers.delete(data.transferId);
            }
            logTransfer('remote-error', data);
            addMessage('them', `Transfer error: ${data.reason || 'unknown'}`, { meta: 'System' });
        });

        socket.on('session-destroyed', (id) => {
            if (id === roomId) {
                statusEl.textContent = 'Session ended by host';
                document.getElementById('controls').querySelectorAll('input,button').forEach(el => el.disabled = true);
            }
        });

        // Send text
        document.getElementById('sendBtn').addEventListener('click', () => {
            const text = document.getElementById('textInput').value.trim();
            if (!text) return;
            socket.emit('send-text', { room: roomId, text: text });
            addMessage('me', text, { meta: 'Me' });
            document.getElementById('textInput').value = '';
        });

        // Send file
        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            startChunkTransfer(file);
            // reset input for next selection
            e.target.value = '';
        });

        // Make Enter key send message
        document.getElementById('textInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); document.getElementById('sendBtn').click(); } });
    </script>
</body>

</html>
