<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudDrop Mobile</title>
    <script src="/socket.io/socket.io.js"></script>
    <meta name="theme-color" content="#ffffff">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --primary-light: #dbeafe;
            --bg: #ffffff;
            --surface: #f8fafc;
            --text: #0f172a;
            --muted: #64748b;
            --border: #e2e8f0
        }

        * {
            box-sizing: border-box
        }

        html,
        body {
            height: 100%;
            overflow: hidden
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            padding: 16px;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            gap: 12px
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 0;
            padding-bottom: 12px;
            flex: 0 0 auto;
            border-bottom: 1px solid var(--border)
        }

        h2 {
            margin: 0;
            font-size: 22px;
            font-weight: 700
        }

        #status {
            font-size: 12px;
            color: var(--muted);
            font-weight: 500;
            padding: 6px 12px;
            background: var(--primary-light);
            border-radius: 0;
            border-left: 3px solid var(--primary);
            min-width: 0;
            max-width: 62%;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis
        }

        #chat {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            margin-bottom: 0;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: var(--surface);
            border-radius: 0;
            border: 1px solid var(--border)
        }

        .msg-row {
            display: flex;
            margin-bottom: 2px
        }

        .msg-row.me {
            justify-content: flex-end
        }

        .msg-row.them {
            justify-content: flex-start
        }

        .message {
            width: 80%;
            padding: 11px 14px;
            border-radius: 0;
            word-break: break-word;
            display: flex;
            flex-direction: column;
            gap: 6px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06)
        }

        .progress-body {
            font-size: 13px;
            line-height: 1.4
        }

        .progress-bar-outer {
            width: 100%;
            height: 8px;
            background: rgba(15, 23, 42, 0.08);
            overflow: hidden
        }

        .progress-bar-inner {
            height: 100%;
            width: 0%;
            background: var(--primary);
            transition: width 0.15s linear
        }

        .progress-pct {
            font-size: 11px;
            color: var(--muted)
        }

        .message.me {
            background: var(--primary);
            color: white
        }

        .message.them {
            background: white;
            color: var(--text);
            border: 1px solid var(--border)
        }

        .meta {
            font-size: 11px;
            color: var(--muted)
        }

        .progress-body {
            font-size: 13px;
            line-height: 1.4
        }

        .progress-status {
            font-size: 11px;
            color: var(--muted)
        }

        .progress-bar-outer {
            width: 100%;
            height: 8px;
            background: rgba(15, 23, 42, 0.08);
            overflow: hidden
        }

        .progress-bar-inner {
            height: 100%;
            width: 0%;
            background: var(--primary);
            transition: width 0.15s linear
        }

        .progress-pct {
            font-size: 11px;
            color: var(--muted)
        }

        .progress-actions {
            display: flex;
            justify-content: flex-end
        }

        .progress-cancel-btn {
            border: 1px solid var(--border);
            background: white;
            color: var(--text);
            padding: 6px 10px;
            font-size: 11px;
            cursor: pointer
        }

        .progress-cancel-btn:hover {
            border-color: var(--primary);
            color: var(--primary)
        }

        .message.me .meta {
            color: rgba(255, 255, 255, 0.8)
        }

        .copy-btn {
            background: transparent;
            border: none;
            color: inherit;
            cursor: pointer;
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 0;
            opacity: 0.7;
            transition: all 0.2s;
            margin-left: 8px;
            width: auto;
            min-width: 0;
            align-self: flex-start;
        }

        .copy-btn:hover {
            opacity: 1;
            background: rgba(0, 0, 0, 0.05)
        }

        .message.me .copy-btn:hover {
            background: rgba(255, 255, 255, 0.2)
        }

        .file-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            word-break: break-all
        }

        .file-link:hover {
            text-decoration: underline
        }

        form.controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: stretch;
            flex: 0 0 auto
        }

        input[type=text] {
            width: 100%;
            min-width: 0;
            padding: 10px 12px;
            border-radius: 0;
            border: 1px solid var(--border);
            font-size: 14px;
            font-family: inherit;
            background: white
        }

        input[type=text]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light)
        }

        form.controls button,
        input[type=file] {
            width: 100%;
            min-width: 0;
            padding: 10px 12px;
            border-radius: 0;
            border: none;
            cursor: pointer;
            font-weight: 500;
            font-family: inherit;
            transition: all 0.2s
        }

        input[type=file] {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text)
        }

        button.primary {
            background: var(--primary);
            color: white;
        }

        button.primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3)
        }
    </style>
</head>

<body>
    <header>
        <h2>CloudDrop</h2>
        <div id="status">Connecting...</div>
    </header>

    <div id="chat" aria-live="polite"></div>

    <form class="controls" id="controls" onsubmit="return false">
        <input type="text" id="textInput" placeholder="Type message...">
        <input type="file" id="fileInput" aria-label="Send file">
        <button id="sendBtn" class="primary">Send</button>
    </form>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/simplepeer.min.js"></script>
    <script src="/client.js"></script>
</body>

</html>
