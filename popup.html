<!DOCTYPE html>
<html>

<head>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --primary-light: #dbeafe;
            --bg: #ffffff;
            --surface: #f8fafc;
            --text: #0f172a;
            --muted: #64748b;
            --border: #e2e8f0;
            --success: #10b981
        }

        body {
            width: 360px;
            box-sizing: border-box;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            color: var(--text);
            background: var(--bg);
            margin: 0;
            height: 560px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 12px
        }

        h3 {
            margin: 0 0 12px 0;
            font-size: 20px;
            font-weight: 700
        }

        /* Page management */
        .page {
            display: none;
            flex: 1;
            min-height: 0
        }

        .page.active { display: flex }

        /* QR Page */
        #qrPage {
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            min-height: 0
        }

        #qrcode {
            text-align: center
        }

        #openChatBtn {
            padding: 12px 24px;
            background: var(--primary);
            color: white;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s
        }

        #openChatBtn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3)
        }

        /* Chat Page */
        #chatPage {
            flex-direction: column;
            gap: 12px;
            min-height: 0;
            width: 100%
        }

        /* Status + Button Row */
        .status-row {
            display: grid;
            grid-template-columns: minmax(0, 4fr) minmax(0, 1fr);
            gap: 8px;
            align-items: center;
            width: 100%
        }

        #status {
            font-size: 12px;
            color: var(--muted);
            padding: 8px 12px;
            background: var(--surface);
            border-left: 3px solid var(--primary);
            margin: 0;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap
        }

        #showQrBtn {
            width: 100%;
            padding: 8px 6px;
            background: var(--surface);
            border: 1px solid var(--border);
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text);
            white-space: nowrap
        }

        #showQrBtn:hover {
            border-color: var(--primary);
            color: var(--primary)
        }

        #chatContainer {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 0
        }

        #chat {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            margin-bottom: 0;
            padding: 12px 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: var(--surface);
            border: 1px solid var(--border)
        }

        .controls {
            display: flex;
            gap: 8px;
            flex-direction: column;
            flex: 0 0 auto
        }

        /* Conversation cards */
        .msg-row {
            display: flex;
            width: 100%;
            margin-bottom: 2px
        }

        .msg-row.me {
            justify-content: flex-end
        }

        .msg-row.them {
            justify-content: flex-start
        }

        .message {
            width: 82%;
            padding: 11px 14px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
            word-break: break-word;
            display: flex;
            flex-direction: column;
            gap: 6px
        }

        .progress-body {
            font-size: 13px;
            line-height: 1.4
        }

        .progress-status {
            font-size: 11px;
            color: var(--muted)
        }

        .progress-bar-outer {
            width: 100%;
            height: 8px;
            background: rgba(15, 23, 42, 0.08);
            overflow: hidden
        }

        .progress-bar-inner {
            height: 100%;
            width: 0%;
            background: var(--primary);
            transition: width 0.15s linear
        }

        .progress-pct {
            font-size: 11px;
            color: var(--muted)
        }

        .progress-actions {
            display: flex;
            justify-content: flex-end
        }

        .progress-cancel-btn {
            border: 1px solid var(--border);
            background: white;
            color: var(--text);
            padding: 6px 10px;
            font-size: 11px;
            cursor: pointer
        }

        .progress-cancel-btn:hover {
            border-color: var(--primary);
            color: var(--primary)
        }

        .message.me {
            background: var(--primary);
            color: white
        }

        .message.them {
            background: white;
            color: var(--text);
            border: 1px solid var(--border)
        }

        .msg-content {
            display: flex;
            align-items: center;
            gap: 8px
        }

        .meta {
            font-size: 11px;
            color: var(--muted)
        }

        .message.me .meta {
            color: rgba(255, 255, 255, 0.8)
        }

        .copy-btn {
            background: transparent;
            border: none;
            color: inherit;
            cursor: pointer;
            font-size: 11px;
            padding: 4px 8px;
            opacity: 0.7;
            transition: opacity 0.2s
        }

        .copy-btn:hover {
            opacity: 1;
            background: rgba(0, 0, 0, 0.05)
        }

        .message.me .copy-btn:hover {
            background: rgba(255, 255, 255, 0.2)
        }

        .file-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            word-break: break-all
        }

        .file-link:hover {
            text-decoration: underline
        }

        /* Inputs and buttons */
        input[type=text],
        input[type=file] {
            padding: 10px 12px;
            border: 1px solid var(--border);
            font-size: 14px;
            font-family: inherit;
            background: white;
            color: var(--text)
        }

        input[type=text]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light)
        }

        input[type=file] {
            cursor: pointer;
            padding: 8px 12px
        }

        button {
            padding: 10px 16px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit
        }

        #sendBtn {
            background: var(--primary);
            color: white
        }

        #sendBtn:hover:not(:disabled) {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3)
        }

        #sendBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed
        }

        #endSessionBtn {
            background: #ef4444;
            color: white;
        }

        #endSessionBtn:hover {
            background: #dc2626;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3)
        }
    </style>
</head>

<body>
    <h3>CloudDrop</h3>

    <!-- QR Page -->
    <div id="qrPage" class="page active">
        <div id="qrcode"></div>
        <button id="openChatBtn">Open Chat</button>
    </div>

    <!-- Chat Page -->
    <div id="chatPage" class="page">
        <!-- Status + Button Row (80/20) -->
        <div class="status-row">
            <div id="status"></div>
            <button id="showQrBtn">Show QR</button>
        </div>

        <!-- Chat Container (100%) -->
        <div id="chatContainer">
            <div id="chat"></div>
            <div class="controls">
                <input type="text" id="textInput" placeholder="Type a message...">
                <button id="sendBtn">Send Text</button>
                <input type="file" id="fileInput">
                <button id="endSessionBtn">End Session</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="socket.io.min.js"></script>
    <script src="qrcode.min.js"></script>
    <script src="popup.js"></script>
</body>

</html>
