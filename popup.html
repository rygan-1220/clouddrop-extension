<!DOCTYPE html>
<html>
<head>
    <style>
        body { width: 320px; padding: 12px; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial; color:#222 }
        #chat { height: 220px; overflow-y: auto; border: 1px solid #e3e3e3; margin-bottom: 10px; padding: 8px; display:flex; flex-direction:column; gap:6px; background:#fafafa }
        .controls { display: flex; gap: 6px; flex-direction: column; }

        /* Conversation bubbles */
        .message { max-width: 78%; padding:8px 10px; border-radius:12px; position:relative; display:inline-block; box-shadow: 0 1px 0 rgba(0,0,0,0.03); word-break:break-word }
        .message.me { margin-left: auto; background: #0b93f6; color: white; border-bottom-right-radius:4px }
        .message.them { margin-right: auto; background: #f0f0f0; color: #111; border-bottom-left-radius:4px }
        .meta { font-size:11px; color:#666; margin-bottom:4px }
        .msg-row { display:flex; align-items:flex-end }
        .copy-btn { margin-left:8px; background:transparent;border:none;color:#666;cursor:pointer;font-size:12px }

        /* File link styling */
        .file-link { color:#0b66d0; text-decoration:none; font-weight:500 }
    </style>
</head>
<body>
    <h3>CloudDrop</h3>
    <div id="qrcode"></div> <!-- QR Code goes here -->

    <div id="status" style="margin-top:8px; font-size:13px; color:#333"></div>

    <div id="chat"></div>

    <div class="controls">
        <input type="text" id="textInput" placeholder="Type a message...">
        <button id="sendBtn">Send Text</button>
        <input type="file" id="fileInput">
        <button id="endSessionBtn" style="background:#e74c3c;color:white;border:none;padding:6px;cursor:pointer">End Session</button>
    </div>

    <!-- Ensure these files are downloaded to your extension folder -->
    <script src="socket.io.min.js"></script>
    <script src="qrcode.min.js"></script>
    <script src="popup.js"></script>
</body>
</html>
